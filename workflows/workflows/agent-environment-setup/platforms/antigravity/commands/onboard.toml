- Local skill file hints if installed: `.agents/skills/deep-research/SKILL.md`, `.agents/skills/system-design/SKILL.md`, `.agents/skills/database-design/SKILL.md`, `.agents/skills/typescript-best-practices/SKILL.md`, `.agents/skills/javascript-best-practices/SKILL.md`, `.agents/skills/python-best-practices/SKILL.md`.
