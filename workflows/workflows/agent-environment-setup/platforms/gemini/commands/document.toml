description = "Documentation workflow: explore the codebase, generate accurate documentation, and review it for quality."
prompt = '''
Execute the native projection of the /document workflow.

Documentation workflow: explore the codebase, generate accurate documentation, and review it for quality.

Execution contract:
1. Treat route selection as already resolved by this command; do not begin with skill discovery.
2. Read `docs/foundation/PRODUCT.md`, `ENGINEERING_RULES.md`, `docs/foundation/ARCHITECTURE.md`, and `docs/foundation/TECH.md` in that order when they exist before non-trivial execution.
Attached skills:
- Load these exact skill IDs first: `tech-doc`, `architecture-doc`, `deep-research`, `code-review`.
- Local skill file hints if installed: `.agents/skills/tech-doc/SKILL.md`, `.agents/skills/architecture-doc/SKILL.md`, `.agents/skills/deep-research/SKILL.md`, `.agents/skills/code-review/SKILL.md`.
- Treat the skill bundle as already resolved for this workflow. Do not start with route discovery.
3. Confirm the request fits the workflow's "When to use" section before acting.
4. Execute according to "Workflow steps" and apply "Context notes".
5. Complete "Verification" checks and report concrete evidence.
6. If freshness, public comparison, or explicit research needs appear, pause implementation and load `deep-research` or route to research first.
7. For outside evidence: repo first, official docs next, Reddit/community only as labeled secondary evidence.

Workflow source:
# Document Workflow

## When to use

Use for generating READMEs, API documentation, architecture decision records, changelogs, developer guides, or any documentation task.

## Agent Chain

`explorer` → `docs-writer` → `reviewer`

## Routing

1. **Explore**: `@explorer` reads the codebase area to be documented — maps structure, public APIs, and key patterns.
2. **Write**: `@docs-writer` produces documentation based on exploration findings.
3. **Review**: `@reviewer` verifies documentation accuracy against the actual code.

## Skill Routing

- Primary skills: `tech-doc`, `architecture-doc`
- Supporting skills (optional): `deep-research`, `code-review`

## Context notes

- Specify the documentation type needed (README, API docs, ADR, changelog, guide).
- All documentation must be verified against the actual codebase.

## Workflow steps

1. Explorer maps the relevant code: public APIs, entry points, configuration, patterns.
2. Docs-writer produces documentation matching the project's existing doc style.
3. Reviewer checks every code reference, path, and command against the actual codebase.
4. If inaccuracies are found, docs-writer corrects them.

## Verification

- All code references and file paths verified against the actual codebase.
- Documentation matches the project's existing style and format.
- Commands and examples are runnable.

## Output Contract

```yaml
WORKFLOW_RESULT:
  primary_agent: docs-writer
  supporting_agents: [explorer, reviewer]
  docs_created: [<path>]
  docs_updated: [<path>]
  accuracy_verified: <boolean>
  follow_up_items: [<string>] | []
```

If command arguments are provided, treat them as additional user context.
'''
