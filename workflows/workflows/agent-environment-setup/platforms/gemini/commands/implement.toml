- Local skill file hints if installed: `.agents/skills/api-design/SKILL.md`, `.agents/skills/typescript-best-practices/SKILL.md`, `.agents/skills/spec-driven-delivery/SKILL.md`, `.agents/skills/system-design/SKILL.md`, `.agents/skills/unit-testing/SKILL.md`, `.agents/skills/integration-testing/SKILL.md`, `.agents/skills/code-review/SKILL.md`.
