name: Release Tag on Main

on:
  push:
    branches:
      - main

concurrency:
  group: release-tag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run attribute checks
        run: npm run test:attributes

      - name: Build CLI runtime
        run: npm run build:cli

      - name: Determine release tag
        id: release
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Check if tag already exists
        id: tagcheck
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}$"; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create and push tag
        if: steps.tagcheck.outputs.exists != 'true'
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "release: ${TAG}"
          git push origin "${TAG}"

      - name: Trigger MCP Docker publish
        if: steps.tagcheck.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          gh workflow run publish-mcp-docker.yml --ref main -f version="${VERSION}" -f push_latest=true

      - name: Check if version already exists on npm
        id: npmcheck
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="${{ steps.release.outputs.version }}"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate publish artifact
        if: steps.npmcheck.outputs.published != 'true'
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.npmcheck.outputs.published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
