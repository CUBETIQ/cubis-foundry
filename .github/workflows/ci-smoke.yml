name: CI Smoke Workflows (All Platforms)

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install smoke test dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep expect

      - name: Check platform assets
        run: npm run check:platform-assets

      - name: Check skill mirrors
        run: npm run check:skill-mirrors

      - name: Validate MCP manifest
        run: npm run validate:mcp-manifest

      - name: Check MCP rules for Codex
        run: npm run check:mcp-rules:codex

      - name: Check MCP rules for Antigravity
        run: npm run check:mcp-rules:antigravity

      - name: Check MCP rules for Gemini
        run: npm run check:mcp-rules:gemini

      - name: Check MCP rules for Copilot
        run: npm run check:mcp-rules:copilot

      - name: Check MCP rules for Claude
        run: npm run check:mcp-rules:claude

      - name: Validate attributes
        run: npm run test:attributes

      - name: Validate CLI help
        run: npm run test:cli-help

      - name: Validate build architecture
        run: npm run test:build-architecture

      - name: Run smoke workflows
        run: npm run test:smoke
