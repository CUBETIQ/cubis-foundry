name: CI Smoke Workflows (All Platforms)

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install smoke test dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep expect

      - name: Check generated assets
        run: npm run check:generated-assets

      - name: Validate attributes
        run: npm run test:attributes

      - name: Validate CLI help
        run: npm run test:cli-help

      - name: Validate build architecture
        run: npm run test:build-architecture

      - name: Run smoke workflows
        run: npm run test:smoke
